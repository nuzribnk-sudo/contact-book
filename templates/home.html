{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Contact Book</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

    <div class="logo">📒 Contact Book</div>

    <div class="nav-links">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'add_contact' %}">+ Add</a>
        <a href="{% url 'logout' %}">Logout</a>
    </div>

</nav>
<div class="top-actions">
    <a href="{% url 'add_contact' %}" class="add-btn">
        + Add Contact
    </a>
</div>

<!-- CONTAINER -->
<div class="container">

    <!-- WELCOME -->
   <h2 class="title">📒 Your Contacts</h2>
<p class="subtitle">All your saved people in one place</p>

    <!-- SEARCH -->
    <form method="GET" class="search-box">
        <input type="text" name="q" placeholder="Search contacts..." value="{{ query|default:'' }}">
        <button type="submit">Search</button>
    </form>

    <!-- CONTACT LIST -->
    {% for contact in contacts %}

    <div class="row">

    <div class="box">👤
        {{ contact.name }}
    </div>

    <div class="actions">

        <a href="{% url 'view_contact' contact.id %}" class="btn view">
            View
        </a>

        <a href="{% url 'edit_contact' contact.id %}" class="btn edit">
            Edit
        </a>

        <a href="{% url 'delete_contact' contact.id %}"
           class="btn delete"
           onclick="return confirm('Delete this contact?')">
            Delete
        </a>

    </div>

</div>

    {% empty %}
        <p class="empty">No contacts found</p>
    {% endfor %}

</div>

</body>
</html>
