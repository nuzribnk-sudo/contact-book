{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Contact</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:linear-gradient(135deg,#eef2ff,#dbeafe,#f8fafc);
            min-height:100vh;
        }

        /* Navbar */

        .navbar{
            background:linear-gradient(135deg,#4338ca,#2563eb);
            color:#fff;
            padding:18px 35px;
            font-size:22px;
            font-weight:700;
            box-shadow:0 10px 25px rgba(0,0,0,.15);
        }

       .wrapper{
    display:flex;
    justify-content:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:520px;   /* 👈 smaller and cleaner */
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 15px 30px rgba(0,0,0,.12);
}

        /* Header */

        .card-header{
            background:linear-gradient(135deg,#4338ca,#2563eb);
            color:#fff;
            text-align:center;
            padding:30px;
        }

        .icon{
            width:70px;
            height:70px;
            margin:auto;
            border-radius:50%;
            background:rgba(255,255,255,.15);
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:30px;
            margin-bottom:15px;
        }

        .card-header h2{
            font-size:28px;
            margin-bottom:8px;
        }

        .card-header p{
            font-size:14px;
            opacity:.9;
        }

        /* Form */

        form{
            padding:25px;
        }

        .form-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
        }

        .form-field{
            display:flex;
            flex-direction:column;
        }

        .form-field label{
            font-weight:600;
            margin-bottom:8px;
            color:#374151;
        }

        .form-field input,
        .form-field textarea,
        .form-field select{
            width:100%;
            padding:12px 14px;
            border:1px solid #d1d5db;
            border-radius:10px;
            font-size:14px;
            transition:.3s;
        }

        .form-field input:focus,
        .form-field textarea:focus,
        .form-field select:focus{
            outline:none;
            border-color:#4338ca;
            box-shadow:0 0 0 4px rgba(67,56,202,.15);
        }

        .form-field input[type=file]{
            padding:9px;
        }

        .full{
            grid-column:1 / 3;
        }

        /* Buttons */

        .buttons{
            display:flex;
            justify-content:center;
            gap:15px;
            margin-top:30px;
        }

        .btn{
            padding:12px 24px;
            border:none;
            border-radius:10px;
            text-decoration:none;
            font-weight:600;
            cursor:pointer;
            transition:.3s;
            font-size:15px;
        }

        .save{
            background:#22c55e;
            color:white;
        }

        .back{
            background:#374151;
            color:white;
        }

        .btn:hover{
            transform:translateY(-3px);
            box-shadow:0 12px 20px rgba(0,0,0,.15);
        }

        /* Responsive */

        @media(max-width:768px){

            .card{
                width:95%;
            }

            .form-grid{
                grid-template-columns:1fr;
            }

            .full{
                grid-column:auto;
            }

            .buttons{
                flex-direction:column;
            }

            .btn{
                width:100%;
                text-align:center;
            }

        }

    </style>

</head>
<body>

<nav class="navbar">
    📒 Contact Book
</nav>

<div class="wrapper">

    <div class="card">

        <div class="card-header">

            <div class="icon">👤</div>

            <h2>Add Contact</h2>

            <p>Enter the contact details below.</p>

        </div>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}
            {% if form.errors %}
<div style="color:red; margin:15px 0;">
    {{ form.errors }}
</div>
{% endif %}

            <div class="form-grid">

                <div class="form-field">
                    <label>Name</label>
                    {{ form.name }}
                </div>

                <div class="form-field">
                    <label>Phone</label>
                    {{ form.phone }}
                </div>

                <div class="form-field">
                    <label>Email</label>
                    {{ form.email }}
                </div>

                <div class="form-field">
                    <label>Image</label>
                    {{ form.image }}
                </div>

                <div class="form-field full">
                    <label>Address</label>
                    {{ form.address }}
                </div>

            </div>

            <div class="buttons">

                <button type="submit" class="btn save">
                    Save Contact
                </button>

                <a href="{% url 'home' %}" class="btn back">
                    Back
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
